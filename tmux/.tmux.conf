# プレフィックスキーをCtrl+aに変更（Ctrl+bより押しやすい）
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# タブ（ウィンドウ）切り替え: Shift+H/L
bind -n S-Left previous-window
bind -n S-Right next-window
# または Shift+H/L（お好みで）
bind -n S-h previous-window
bind -n S-l next-window

# 新しいタブ: Ctrl+a c
# タブを閉じる: Ctrl+a x

# マウス操作を有効化
set -g mouse on

# 256色対応
set -g default-terminal "screen-256color"

# ステータスバーをシンプルに
set -g status-style 'bg=#333333 fg=#ffffff'
set -g status-left '[#S] '
set -g status-right ''

# ウィンドウ（タブ）の表示形式
# 非アクティブ: [1:zsh]
setw -g window-status-format ' [#I:#W] '
setw -g window-status-style 'fg=#888888'

# アクティブ: [1:zsh] を強調表示
setw -g window-status-current-format ' [#I:#W] '
setw -g window-status-current-style 'fg=#ffffff,bg=#555555,bold'

# ウィンドウ間の区切り
set -g window-status-separator ''

# ウィンドウ番号を1から開始
set -g base-index 1
setw -g pane-base-index 1

# Escキーの遅延をなくす（Vim用）
set -sg escape-time 0
